services:
    nats:
        image: nats:2.14.0-alpine3.22
        command: ["-js", "-m", "8222"]
        ports:
            - "4222:4222"
            - "8222:8222"
        volumes:
            - nats_data:/data
        restart: unless-stopped
        networks:
            - whisper-net

    mediamtx:
        build:
            context: ./mediamtx
            dockerfile: Dockerfile
        volumes:
            - ./assets:/assets:ro
        ports:
            - "8554:8554"
            - "8888:8888"
            - "8889:8889"
            - "9997:9997"
            - "1935:1935"
        restart: unless-stopped
        networks:
            - whisper-net

    audio-segmenter:
        build:
            context: .
            dockerfile: Dockerfile.golang
            args:
                APP_DIR: audio-segmenter
                APP_BIN: audio-segmenter
        environment:
            NATS_URL: nats://nats:4222
            APP_BIN: audio-segmenter
        ports:
            - "8001:8001"
        depends_on:
            - nats
            - mediamtx
        restart: unless-stopped
        networks:
            - whisper-net

    ws-captions:
        build:
            context: .
            dockerfile: Dockerfile.golang
            args:
                APP_DIR: ws-captions
                APP_BIN: ws-captions
        environment:
            NATS_URL: nats://nats:4222
            LISTEN_ADDR: :8002
            APP_BIN: ws-captions
        ports:
            - "8002:8002"
        depends_on:
            - nats
        restart: unless-stopped
        networks:
            - whisper-net

    ui:
        build:
            context: .
            dockerfile: Dockerfile.ui
        environment:
            PORT: "8000"
            STREAM_REGISTRY_URL: http://stream-registry:8003
            WS_CAPTIONS_URL: ws://localhost:8002
            HLS_BASE_URL: http://localhost:8888
        ports:
            - "8000:8000"
        depends_on:
            - mediamtx
            - audio-segmenter
            - ws-captions
        restart: unless-stopped
        networks:
            - whisper-net

    stream-registry:
        build:
            context: .
            dockerfile: stream-registry/Dockerfile
        environment:
            PORT: "8003"
        ports:
            - "8003:8003"
        restart: unless-stopped
        networks:
            - whisper-net

volumes:
    nats_data:

networks:
    whisper-net:
        driver: bridge

